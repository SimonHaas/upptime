repo: upptime # The name of this repository

sites:
  - name: Homepage
    url: https://www.simonhaas.eu/
  - name: cattle.email
    url: https://www.cattle.email/
  - name: app.cattle.email
    url: https://app.cattle.email
  - name: mail.cattle.email
    url: https://mail.cattle.email/
  - name: authelia.cattle.email
    url: https://authelia.cattle.email
  - name: bum.bayreuth.de
    url: https://bum.bayreuth.de/.well-known/matrix/client
